services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./.data:/app/.data
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
